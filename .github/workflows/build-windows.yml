name: build-windows-app

on:
  workflow_dispatch:
  push:
    paths:
      - "src/Barraca.RRHH.App.Mac/**"
      - "src/Barraca.RRHH.Application/**"
      - "src/Barraca.RRHH.Infrastructure/**"
      - "src/Barraca.RRHH.Domain/**"
      - "Barraca.RRHH.sln"
      - "global.json"

jobs:
  publish-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show SDK info
        shell: pwsh
        run: |
          dotnet --version
          dotnet --list-sdks

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore src/Barraca.RRHH.App.Mac/Barraca.RRHH.App.Mac.csproj

      - name: Publish (win-x64)
        shell: pwsh
        run: |
          $outDir = "dist/windows-win-x64/publish"
          dotnet publish src/Barraca.RRHH.App.Mac/Barraca.RRHH.App.Mac.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:IncludeAllContentForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            -o $outDir

          if (-not (Test-Path "$outDir/appsettings.json")) {
            Copy-Item "src/Barraca.RRHH.App.Mac/appsettings.json" "$outDir/appsettings.json" -Force
          }

      - name: Pack artifact
        shell: pwsh
        run: |
          $zipPath = "dist/windows-win-x64/Barraca-RRHH-win-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "dist/windows-win-x64/publish/*" -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: barraca-rrhh-windows-x64
          path: dist/windows-win-x64/Barraca-RRHH-win-x64.zip