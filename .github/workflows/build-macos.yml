name: build-macos-app

on:
  workflow_dispatch:
  push:
    paths:
      - "src/Barraca.RRHH.App.Mac/**"
      - "src/Barraca.RRHH.Application/**"
      - "src/Barraca.RRHH.Infrastructure/**"
      - "src/Barraca.RRHH.Domain/**"
      - "Barraca.RRHH.sln"

jobs:
  publish-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show SDK info
        run: |
          dotnet --version
          dotnet --list-sdks

      - name: Setup code signing keychain (optional)
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE_P12_BASE64" ] || [ -z "$MACOS_CERTIFICATE_PASSWORD" ]; then
            echo "No hay certificado configurado en secrets; se omite keychain de firma."
            exit 0
          fi

          KEYCHAIN_NAME="build-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/macos-signing-cert.p12"
          if [ -z "$KEYCHAIN_PASSWORD" ]; then
            KEYCHAIN_PASSWORD="temporary-build-keychain-password"
          fi

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security import "$CERT_PATH" -k "$KEYCHAIN_NAME" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_NAME" login.keychain-db
          security default-keychain -s "$KEYCHAIN_NAME"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

      - name: Package app and zip (osx-arm64)
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          chmod +x scripts/package-macos.sh
          bash scripts/package-macos.sh osx-arm64 Release false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: barraca-rrhh-macos-arm64
          path: dist/macos-osx-arm64
